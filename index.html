<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600&display=swap" rel="stylesheet"/>

  <!-- FAVICON -->
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />

  <link rel="stylesheet" href="./styles.css" />
  <script type="module" src="./scripts/main.js"></script>

  <title>Kanban Task Management</title>
</head>

<body>

  <!-- SIDEBAR -->
  <nav class="side-bar">

    <!-- LOGO -->
    <div id="side-logo-div">
      <img id="logo" src="./assets/logo-light.svg" alt="kanban logo" />
    </div>

    <!-- BOARDS -->
    <div class="boards-nav-links-div">
      <h4 id="headline-sidepanel">ALL BOARDS (1)</h4>
      <button class="board-btn">Launch Career</button>
    </div>

    <!-- BOTTOM -->
    <div class="sidebar-bottom">
      <div class="theme-toggle-container">
  <img src="./assets/icon-light-theme.svg" alt="light theme" />

  <div class="theme-toggle" id="theme-toggle">
    <div class="toggle-circle"></div>
  </div>

  <img src="./assets/icon-dark-theme.svg" alt="dark theme" />
</div>

     <button class="hide-sidebar-btn">
  <img src="./assets/icon-hide-sidebar.svg" alt="hide sidebar" />
  Hide Sidebar
</button>
    </div>

  </nav>

  <!-- SHOW SIDEBAR BUTTON -->
<button id="show-sidebar-btn" class="show-sidebar-tab" aria-label="Show sidebar">
  <img src="./assets/icon-show-sidebar.svg" alt="show sidebar" />
</button>

  <!-- MAIN -->
  <div id="layout">

    <!-- HEADER -->
    <header>
  <div class="header-name-div">
  <button id="mobile-menu-btn" aria-label="Toggle menu">☰</button>
    <img src="./assets/favicon.svg" class="logo-mobile" />
    <h2 id="header-board-name">Launch Career</h2>
  </div>

  <button id="add-new-task-btn">+ Add New Task</button>
</header>

    <!-- BOARD -->
    <div class="container">
      <main class="card-column-main">

        <div class="column-div" data-status="todo">
          <div class="column-head-div">
            <span class="dot" id="todo-dot"></span>
            <h4 class="columnHeader">TODO (0)</h4>
          </div>
          <div class="tasks-container"></div>
        </div>

        <div class="column-div" data-status="doing">
          <div class="column-head-div">
            <span class="dot" id="doing-dot"></span>
            <h4 class="columnHeader">DOING (0)</h4>
          </div>
          <div class="tasks-container"></div>
        </div>

        <div class="column-div" data-status="done">
          <div class="column-head-div">
            <span class="dot" id="done-dot"></span>
            <h4 class="columnHeader">DONE (0)</h4>
          </div>
          <div class="tasks-container"></div>
        </div>

      </main>
    </div>

  </div>

  <!-- ADD TASK MODAL -->
    <dialog class="modal-overlay" aria-label="Add new task">
    <form class="modal-window" id="new-task-modal-window">

      <div class="modal-header">
        <h3>Add New Task</h3>
        <button type="button" class="close-btn" id="cancel-add-btn">&times;</button>
      </div>

      <label>Title</label>
      <input id="title-input" placeholder="e.g. Take a little break" required />

      <label>Description</label>
      <textarea id="desc-input" placeholder="e.g. Take a breather and come back refreshed."></textarea>

      <label>Status</label>
      <select id="select-status">
        <option value="todo">todo</option>
        <option value="doing">doing</option>
        <option value="done">done</option>
      </select>

      <input type="submit" value="Create Task" class="submit-btn" />

    </form>
  </dialog>

  <!-- EDIT TASK MODAL -->
    <dialog id="task-modal" aria-label="Edit task">
    <form method="dialog" id="task-form">

      <div class="modal-header">
        <h3>Task</h3>
        <button type="button" class="close-btn" id="close-modal-btn">&times;</button>
      </div>

      <label>Title</label>
      <input id="task-title" required />

      <label>Description</label>
      <textarea id="task-desc"
        placeholder="e.g. Take a breather and come back refreshed."></textarea>

      <label>Status</label>
      <select id="task-status">
        <option value="todo">todo</option>
        <option value="doing">doing</option>
        <option value="done">done</option>
      </select>

      <button type="submit" class="submit-btn">Save Changes</button>
      <button type="button" id="delete-task-btn">Delete Task</button>

    </form>
  </dialog>

</body>
</html>
